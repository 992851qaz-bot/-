<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>第二頁</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI','Microsoft JhengHei',sans-serif;background:#0d1117}
.page{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;transition:transform .6s cubic-bezier(.4,0,.2,1),opacity .6s cubic-bezier(.4,0,.2,1);will-change:transform,opacity}
.page.active{transform:translateX(0);opacity:1;pointer-events:auto;z-index:1}
.page.left{transform:translateX(-100%);opacity:0;pointer-events:none;z-index:0}
.page.right{transform:translateX(100%);opacity:0;pointer-events:none;z-index:0}
#page1{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)}
#page2{background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%)}
.content{text-align:center;color:#fff;padding:2rem}
.content h1{font-size:3rem;margin-bottom:1rem;text-shadow:0 2px 10px rgba(0,0,0,.3)}
.content p{font-size:1.2rem;opacity:.9;max-width:600px;line-height:1.8}
.toggle-btn{position:fixed;top:20px;left:20px;z-index:999;width:48px;height:48px;border-radius:50%;border:none;background:rgba(255,255,255,.2);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:#fff;font-size:1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .3s,background .3s;box-shadow:0 4px 15px rgba(0,0,0,.2)}
.toggle-btn:hover{transform:scale(1.1);background:rgba(255,255,255,.35)}
.toggle-btn:active{transform:scale(.95)}
.card{background:rgba(255,255,255,.12);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:20px;padding:3rem;box-shadow:0 8px 32px rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.15);max-width:520px;width:90%}
.card ul{text-align:left;list-style:none;margin-top:1.5rem}
.card ul li{padding:.6rem 0;border-bottom:1px solid rgba(255,255,255,.1);font-size:1rem;color:rgba(255,255,255,.85)}
.card ul li:last-child{border-bottom:none}
.card ul li::before{content:'✦ ';color:rgba(255,255,255,.5)}
</style>
</head>
<body>
<button class="toggle-btn" id="toggleBtn" aria-label="切換頁面">⇄</button>

<div id="page1" class="page left">
<div class="card">
<div class="content">
<h1>歡迎光臨</h1>
<p>這是第一個頁面，點擊左上角的按鈕即可流暢切換到第二個畫面。</p>
<ul>
<li>流暢動畫切換</li>
<li>現代化介面設計</li>
<li>響應式佈局</li>
</ul>
</div>
</div>
</div>

<div id="page2" class="page active">
<div class="card">
<div class="content">
<h1>第二頁面</h1>
<p>這是第二個頁面的內容區域，您可以隨時切換回第一個畫面。</p>
<ul>
<li>玻璃擬態風格</li>
<li>漸層色彩背景</li>
<li>互動式體驗</li>
</ul>
</div>
</div>
</div>

<script>
(function(){
var _c=2;
var _p1=document.getElementById('page1');
var _p2=document.getElementById('page2');
var _b=document.getElementById('toggleBtn');
function _s(){
if(_c===1){_p1.className='page left';_p2.className='page active';_c=2;
if(history.replaceState)history.replaceState(null,'','in2.html');
}else{_p2.className='page right';_p1.className='page active';_c=1;
if(history.replaceState)history.replaceState(null,'','index.html');
}
}
_b.addEventListener('click',_s);
document.addEventListener('contextmenu',function(e){e.preventDefault();return false});
document.addEventListener('keydown',function(e){
if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='i'||e.key==='J'||e.key==='j'||e.key==='C'||e.key==='c'))||(e.ctrlKey&&(e.key==='U'||e.key==='u'||e.key==='S'||e.key==='s'))){e.preventDefault();return false}
});
document.addEventListener('dragstart',function(e){e.preventDefault()});
document.addEventListener('copy',function(e){e.preventDefault()});
document.addEventListener('cut',function(e){e.preventDefault()});
(function _d(){
var _t=new Date();
debugger;
if(new Date()-_t>100){document.body.innerHTML='';window.location.reload();}
setTimeout(_d,1000);
})();
})();
</script>
</body>
</html>
